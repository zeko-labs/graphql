    """Public key to find accounts for"""
    publicKey: PublicKey!
  ): [Account!]!

  """Find the account that owns a given token"""
  tokenOwner(
    """Token ID to find the owning account for"""
    tokenId: TokenId!
  ): Account

  """Find all accounts for a token ID"""
  tokenAccounts(
    """Token ID to find accounts for"""
    tokenId: TokenId!
  ): [Account!]!

  """Get information about the current snark worker"""
  currentSnarkWorker: SnarkWorker

  """
  Retrieve a list of blocks from transition frontier's root to the current best tip. Returns an error if the system is bootstrapping.
"""
  bestChain(
    """
    The maximum number of blocks to return. If there are more blocks in the transition frontier from root to tip, the n blocks closest to the best tip will be returned
"""
    maxLength: Int
  ): [Block!]

  """
  Retrieve a block with the given state hash or height, if contained in the transition frontier.
"""
  block(
    """The height of the desired block in the best chain"""
    height: Int

    """The state hash of the desired block"""
    stateHash: String
  ): Block!

  """Get the genesis block"""
  genesisBlock: Block!

  """List of peers that the daemon first used to connect to the network"""
  initialPeers: [String!]!

  """List of peers that the daemon is currently connected to"""
  getPeers: [Peer!]!

  """
  Retrieve all the scheduled user commands for a specified sender that the current daemon sees in its transaction pool. All scheduled commands are queried if no sender is specified
"""
  pooledUserCommands(
    """Ids of User commands"""
    ids: [ID!]

    """Hashes of the commands to find in the pool"""
    hashes: [String!]

    """Public key of sender of pooled user commands"""
    publicKey: PublicKey
  ): [UserCommand!]!

  """
  Retrieve all the scheduled zkApp commands for a specified sender that the current daemon sees in its transaction pool. All scheduled commands are queried if no sender is specified
"""
  pooledZkappCommands(
    """Ids of zkApp commands"""
    ids: [ID!]

    """Hashes of the zkApp commands to find in the pool"""
    hashes: [String!]

    """Public key of sender of pooled zkApp commands"""
    publicKey: PublicKey
  ): [ZkappCommandResult!]!

  """Get the status of a transaction"""
  transactionStatus(
    """Id of a zkApp transaction"""
    zkappTransaction: ID

    """Id of a Payment"""
    payment: ID
  ): TransactionStatus!

  """Trust status for an IPv4 or IPv6 address"""
  trustStatus(ipAddress: String!): [TrustStatusPayload!]

  """IP address and trust status for all peers"""
  trustStatusAll: [TrustStatusPayload!]!

  """List of completed snark works that have the lowest fee so far"""
  snarkPool: [CompletedWork!]!

  """List of snark works that are yet to be done"""
  pendingSnarkWork: [PendingSnarkWork!]!

  """
  Find any sequence of snark work between two indexes in all available snark work. Returns both completed and uncompleted work.
"""
  snarkWorkRange(
    """
    The last index to be taken from all available snark work (exclusive). If not specified or greater than the available snark work list,all elements from index [startingIndex] will be returned. An empty list will be returned if startingIndex is not a valid index or if startingIndex >= endingIndex.
"""
    endingIndex: UInt32

    """The first index to be taken from all available snark work"""
    startingIndex: UInt32!
  ): [PendingSnarkWorkSpec!]!

  """
  obtain a membership proof for an account in the snarked ledger along with the account's balance, timing information, and nonce
"""
  snarkedLedgerAccountMembership(
    """Hash of the snarked ledger to check"""
    stateHash: String!

    """Token id of the account to check"""
    accountInfos: [AccountInput!]!
  ): [MembershipInfo!]!

  """
  obtain a membership proof for an account in the snarked ledger along with the accounts full information encoded as base64 binable type
"""
  encodedSnarkedLedgerAccountMembership(
    """Hash of the snarked ledger to check"""
    stateHash: String!

    """Token id of the account to check"""
    accountInfos: [AccountInput!]!
  ): [EncodedAccount!]!

  """
  The constants used to determine the configuration of the genesis block and all of its transitive dependencies
"""
  genesisConstants: GenesisConstants!

  """
  The time offset in seconds used to convert real times into blockchain times
"""
  timeOffset: Int!

  """Validate the format and signature of a payment"""
  validatePayment(
    """
    If a signature is provided, this transaction is considered signed and will be broadcasted to the network without requiring a private key
"""
    signature: SignatureInput
    input: SendPaymentInput!
  ): Boolean!

  """
  Evaluate a vrf for the given public key. This includes a witness which may be verified without access to the private key for this vrf evaluation.
"""
  evaluateVrf(
    vrfThreshold: VrfThresholdInput
    publicKey: PublicKey!
    message: VrfMessageInput!
  ): VrfEvaluation!

  """
  Check a vrf evaluation commitment. This can be used to check vrf evaluations without needing to reveal the private key, in the format returned by evaluateVrf
"""
  checkVrf(input: VrfEvaluationInput!): VrfEvaluation!

  """The runtime configuration passed to the daemon at start-up"""
  runtimeConfig: JSON!

  """
  The runtime configuration for a blockchain fork intended to be a continuation of the current one. By default, this returns the newest block that appeared before the transaction stop slot provided in the configuration, or the best tip if no such block exists.
"""
  fork_config(
    """The height of the desired block in the best chain"""
    height: Int

    """The state hash of the desired block"""
    stateHash: String
  ): JSON!

  """
  A graphviz dot format representation of the deamon's internal thread graph
"""
  threadGraph: String!

  """The pickles verification key for the protocol state proof"""
  blockchainVerificationKey: JSON!

  """
  The chain-agnostic identifier of the network this daemon is participating in
"""
  networkID: String!

  """The signature kind that this daemon instance is using"""
  signatureKind: String!

  """Get the protocol state for a given block, optionally encoded in Base64"""
  protocolState(
    """Encoding format (JSON or BASE64)"""
    encoding: Encoding

    """The height of the desired block in the best chain"""
    height: Int

    """The state hash of the desired block"""
    stateHash: String
  ): String!
}
