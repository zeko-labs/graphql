layer: library
fileGroups:
  src:
    - src/**/*
    - tsconfig.json
    - tsconfig.build.json
    - tsdown.config.ts
    - package.json
tasks:
  build:
    command: tsdown
    inputs:
      - "@globs(src)"
    outputs:
      - dist/**
  lint:
    command: biome check --formatter-enabled=false
    inputs:
      - "@group(src)"
  lint-fix:
    command: biome check --formatter-enabled=false --write
    inputs:
      - "@group(src)"
  typecheck:
    command: tsgo --noEmit --declaration false --declarationMap false
    inputs:
      - "@globs(src)"
  schema-get-zeko:
    command: gql-tada generate schema 'https://alphanet.zeko.io/graphql' --output './src/generated/zeko.graphql'
    options:
      cache: false
    outputs:
      - src/generated/zeko.graphql
  schema-get-zeko-archive:
    command: gql-tada generate schema 'https://archive.testnet.zeko.io/graphql' --output './src/generated/zeko-archive.graphql'
    options:
      cache: false
    outputs:
      - src/generated/zeko-archive.graphql
  schema-get-mina:
    command: gql-tada generate schema 'https://gateway.mina.devnet.zeko.io' --output './src/generated/mina.graphql'
    options:
      cache: false
    outputs:
      - src/generated/mina.graphql
  schema-get-mina-archive:
    command: gql-tada generate schema 'https://gateway.mina.archive.devnet.zeko.io' --output './src/generated/mina-archive.graphql'
    options:
      cache: false
    outputs:
      - src/generated/mina-archive.graphql
  schema-get-leaderboard:
    command: cp ../../services/leaderboard/api/graphql/schema.graphql ./src/generated/leaderboard.graphql
    options:
      cache: false
    outputs:
      - src/generated/leaderboard.graphql
  schema-get-bridge-indexer:
    command: cp ../../services/actions/api/graphql/schema.graphql ./src/generated/bridge-indexer.graphql
    options:
      cache: false
    outputs:
      - src/generated/bridge-indexer.graphql
  schema-get:
    deps:
      - schema-get-zeko
      - schema-get-zeko-archive
      - schema-get-mina
      - schema-get-mina-archive
      - schema-get-leaderboard
      - schema-get-bridge-indexer
